<!doctype html>
<html lang="en">
  <head>
    <!-- Section 1: Head -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Section 2: Header -->
    <header>
      <h1><u>Profile Card</u></h1>
    </header>

    <!-- Section 3: Main Container -->
    <div id="mainbox">
      <!-- Section 4: Profile Card -->
      <div id="box">
        <!-- Section 5: Profile Image -->
        <section class="card-section">
          <img id="profile" src="photo.jpeg" alt="Bhanu Joshi photo" />
        </section>

        <hr />

        <!-- Section 6: Name -->
        <section class="card-section">
          <h3>Bhanu Joshi</h3>
        </section>

        <!-- Section 7: Role -->
        <section class="card-section">
          <p id="role">AI/ML Engineer</p>
        </section>

        <hr />

        <!-- Section 8: About -->
        <section class="card-section">
          <p id="about">
            BCA graduate exploring Machine Learning and Full-Stack Development.
            Curious learner who enjoys solving real-world problems with code.
          </p>
        </section>

        <hr />

        <!-- Section 9: Location -->
        <section class="card-section">
          <p>Location : Uttarakhand, India</p>
        </section>

        <hr />

        <!-- Section 10: Contact Button -->
        <section class="card-section">
          <button>Contact Me</button>
        </section>
      </div>
    </div>
  </body>
</html>
